services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: empire-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    networks:
      - kafka-tier-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list",
        ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:6.0
    container_name: empire-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: |
        mongosh --port 27017 --quiet --eval "
        try {
          if (rs.status().ok) quit(0);
        } catch (e) {
          if (rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}).ok) quit(0);
        }
        quit(1);
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - database-tier-net

  mailpit:
    image: axllent/mailpit
    container_name: empire-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - kafka-tier-net

  kafka-connect:
    image: quay.io/debezium/connect:2.4
    container_name: empire-debezium
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - mongodb
    networks:
      - kafka-tier-net
      - database-tier-net

  order-service:
    container_name: empire-order
    build:
      context: .
      dockerfile: ./services/order-service/Dockerfile
    ports:
      - "4001:4001"
    volumes:
      - .:/app
      - /app/node_modules
    restart: on-failure
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - kafka-tier-net
      - database-tier-net

  notification-service:
    container_name: empire-notification
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - kafka-tier-net

  realtime-service:
    container_name: empire-realtime
    build:
      context: .
      dockerfile: ./services/realtime-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - kafka-tier-net

  empire-redis:
    image: redis:7-alpine
    container_name: empire-redis
    ports:
      - "6279:6379"
    networks:
      - kafka-tier-net

networks:
  kafka-tier-net:
    driver: bridge
  database-tier-net:
    driver: bridge

volumes:
  mongo_data:
